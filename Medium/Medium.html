<style id="modal-fix">
/* === Modal/Overlay Fixes === */

/* Generic modal overlays with high z-index */
[role="dialog"],
[role="alertdialog"],
[aria-modal="true"] {
    display: none !important;
}

/* Backdrop/overlay layers */
.ReactModal__Overlay,
.modal-backdrop,
.overlay-backdrop,
.modal__overlay,
[class*="Overlay"][class*="modal"],
[class*="overlay"][class*="Modal"],
[data-testid*="modal"],
[data-testid*="overlay"],
[data-testid*="dialog"] {
    display: none !important;
}

/* Cookie consent banners */
[class*="cookie-banner"],
[class*="cookie-consent"],
[class*="cookieBanner"],
[class*="CookieConsent"],
[id*="cookie-banner"],
[id*="cookie-consent"],
[id*="onetrust"],
[id*="CookieConsent"],
#onetrust-consent-sdk,
#onetrust-banner-sdk,
.onetrust-pc-dark-filter,
#truste-consent-track,
.truste_overlay,
[class*="gdpr"],
[class*="GDPR"],
#sp_message_container_1,
[id^="sp_message_container"],
.message-container[role="dialog"] {
    display: none !important;
}

/* Notification/promo popups */
[class*="notification-banner"],
[class*="promo-popup"],
[class*="announcement-banner"],
[class*="info-banner"][style*="z-index"],
.intercom-lightweight-app,
.intercom-app,
#intercom-container,
#hubspot-messages-iframe-container,
[class*="drift-"],
[id*="drift-"],
#beacon-container,
.grecaptcha-badge {
    display: none !important;
}

/* Chat widgets */
[class*="chat-widget"],
[class*="chatWidget"],
[id*="chat-widget"],
[id*="chatbot"],
[id*="salesbot"],
#launcher,
#zendesk-chat,
.zEWidget-launcher,
[class*="LiveChat"],
[id*="livechat"] {
    display: none !important;
}

/* Airbnb-specific modal */
[class*="c1yo68k3"],
div[style*="position: fixed"][style*="inset: 0"],
div[style*="position:fixed"][style*="inset:0"] {
    display: none !important;
}

/* Generic full-screen overlays */
body > div[style*="z-index: 2147483647"],
body > div[style*="z-index:2147483647"],
div[style*="position: fixed"][style*="z-index: 99999"],
div[style*="position: fixed"][style*="z-index:99999"],

div._vis_hide_layer,
#_vis_opt_path_hides {
    display: none !important;
}

body {
    overflow: auto !important;
    position: static !important;
}
html {
    overflow: auto !important;
}

    }
    getVisibleCandidates("button, a, [role='button'], input[type='submit'], input[type='button']")
      .slice(0, 48)
      .forEach((node) => {
        const style = window.getComputedStyle(node);
        addCandidate(style.backgroundColor, 1.2);
        addCandidate(style.borderColor, 0.55);
        addCandidate(style.color, 0.35);
      });

    let selected = candidates.sort((left, right) => right.score - left.score)[0]?.rgb || [37, 99, 235];
    const presetAccent = parseColor(config.brand_accent);
    const [, selectedS, selectedL] = rgbToHsl(selected);
    if (presetAccent && (selectedS < 0.22 || selectedL < 0.16 || selectedL > 0.9)) {
      selected = presetAccent;
    }
    const [h, s, l] = rgbToHsl(selected);
    const strong = hslToRgb(h, clamp(s + 0.1, 0.48, 0.92), clamp(l * 0.76, 0.18, 0.46));
    htmlEl.style.setProperty("--scenario-accent-rgb", selected.join(", "));
    htmlEl.style.setProperty("--scenario-accent", rgbToHex(selected));
    htmlEl.style.setProperty("--scenario-accent-strong", rgbToHex(strong));
    htmlEl.dataset.scenarioAccentReady = "true";
  };

  const applyHostTheme = () => {
    if (htmlEl.dataset.scenarioHostThemeReady === "true") return;

    const pageType = classifyPage();
    const bodyStyle = window.getComputedStyle(document.body);
    setScenarioVar("--scenario-font-family", bodyStyle.fontFamily);
    setScenarioVar("--scenario-font-size", bodyStyle.fontSize || "14px");
    if (pageType !== "auth") {
      setScenarioVar("--scenario-card-radius", "24px");
      setScenarioVar("--scenario-card-padding", "24px");
      setScenarioVar("--scenario-input-radius", "14px");
      setScenarioVar("--scenario-button-radius", config.challenge_profile === "payment" ? "12px" : "14px");
      setScenarioVar("--scenario-card-shadow", "0 18px 40px rgba(15, 23, 42, 0.08)");
    }

    const hostCard = pickHostCard();
    if (hostCard) {
      setScenarioVar("--scenario-card-bg", getUsableBackground(hostCard.style));
      setScenarioVar("--scenario-card-border", getBorderValue(hostCard.style, "1px solid rgba(148,163,184,0.18)"));
      setScenarioVar("--scenario-card-shadow", hostCard.style.boxShadow && hostCard.style.boxShadow !== "none" ? hostCard.style.boxShadow : "0 22px 48px rgba(15, 23, 42, 0.10)");
      setScenarioVar("--scenario-card-radius", getUsableRadius(hostCard.style, pageType === "auth" ? "24px" : "24px"));
      setScenarioVar("--scenario-card-padding", hostCard.style.padding && hostCard.style.padding !== "0px" ? hostCard.style.padding : "24px");
      setScenarioVar("--scenario-note-bg", getUsableBackground(hostCard.style));
      setScenarioVar("--scenario-note-border", `1px solid rgba(var(--scenario-accent-rgb), 0.18)`);
      setScenarioVar("--scenario-note-shadow", hostCard.style.boxShadow && hostCard.style.boxShadow !== "none" ? hostCard.style.boxShadow : "0 18px 34px rgba(15, 23, 42, 0.08)");
    }

    const hostInput = pickHostInput();
    if (hostInput) {
      setScenarioVar("--scenario-input-bg", getUsableBackground(hostInput.style));
      setScenarioVar("--scenario-input-border", getBorderValue(hostInput.style, "1px solid rgba(148,163,184,0.38)"));
      setScenarioVar("--scenario-input-radius", getUsableRadius(hostInput.style, "14px"));
      setScenarioVar("--scenario-input-color", hostInput.style.color);
      setScenarioVar("--scenario-input-shadow", hostInput.style.boxShadow && hostInput.style.boxShadow !== "none" ? hostInput.style.boxShadow : "none");
      setScenarioVar("--scenario-font-family", hostInput.style.fontFamily || bodyStyle.fontFamily);
      setScenarioVar("--scenario-font-size", hostInput.style.fontSize || bodyStyle.fontSize || "14px");
      setScenarioVar("--scenario-note-padding", hostInput.style.padding && hostInput.style.padding !== "0px" ? hostInput.style.padding : "16px 18px");
    }

    const primaryButton = pickPrimaryButton();
    if (primaryButton) {
      const primaryButtonRgb = parseColor(primaryButton.style.backgroundColor);
      const [, buttonS, buttonL] = primaryButtonRgb ? rgbToHsl(primaryButtonRgb) : [0, 0, 0];
      const preferBrandAccent = !!config.brand_accent && (!primaryButtonRgb || buttonS < 0.18 || buttonL < 0.16 || buttonL > 0.88);
      setScenarioVar(
        "--scenario-button-bg",
        preferBrandAccent ? `linear-gradient(135deg, var(--scenario-accent), var(--scenario-accent-strong))` : getUsableBackground(primaryButton.style)
      );
      setScenarioVar("--scenario-button-color", preferBrandAccent ? "#ffffff" : primaryButton.style.color);
      setScenarioVar("--scenario-button-radius", getUsableRadius(primaryButton.style, pageType === "auth" ? "999px" : "14px"));
      setScenarioVar(
        "--scenario-button-border",
        primaryButton.style.borderTopWidth && primaryButton.style.borderTopWidth !== "0px"
          ? `${primaryButton.style.borderTopWidth} ${primaryButton.style.borderTopStyle} ${primaryButton.style.borderTopColor}`
          : "0"
      );
      setScenarioVar("--scenario-button-shadow", primaryButton.style.boxShadow && primaryButton.style.boxShadow !== "none" ? primaryButton.style.boxShadow : "0 16px 28px rgba(var(--scenario-accent-rgb), 0.28)");
    }

    const widthAnchor = pickWidthAnchor();
    if (widthAnchor) {
      const width = Math.min(widthAnchor.getBoundingClientRect().width, 1040);
      setScenarioVar("--scenario-content-width", `${width}px`);
      setScenarioVar("--scenario-grid-columns", getScenarioColumnCount(width));
    }

    htmlEl.dataset.scenarioHostThemeReady = "true";
  };

  const applyPageUplift = () => {
    const pageType = classifyPage();
    if (pageType !== "auth") return;
    const shellState = ensureAuthShell();
    const cluster = shellState?.cluster instanceof HTMLElement ? shellState.cluster : null;
    if (cluster instanceof HTMLElement) {
      cluster.dataset.benchmarkPrimaryCard = "true";
      const submit = cluster.querySelector("button, input[type='submit'], input[type='button']");
      if (submit instanceof HTMLElement) {
        submit.dataset.benchmarkPrimaryButton = "true";
        if (config.brand_accent) {
          submit.style.background = "linear-gradient(135deg, var(--scenario-accent), var(--scenario-accent-strong))";
          submit.style.color = "#ffffff";
          submit.style.border = "0";
          submit.style.boxShadow = "0 14px 28px rgba(var(--scenario-accent-rgb), 0.24)";
        }
      }
      const shellWidth = shellState?.shell instanceof HTMLElement ? shellState.shell.getBoundingClientRect().width : 0;
      const clusterWidth = cluster.getBoundingClientRect().width;
      const widthBasis = shellWidth || clusterWidth;
      setScenarioVar("--scenario-content-width", `${Math.min(Math.max(widthBasis + 48, 420), 1120)}px`);
      setScenarioVar("--scenario-grid-columns", getScenarioColumnCount(clusterWidth));
    }
  };

  const repairBrokenBrandMedia = () => {
    if (htmlEl.dataset.benchmarkBrandMediaFixed === "true") return;
    const pageType = classifyPage();
    const displayName = humanizeSiteName(config.site_name || document.title || "Account");
    const normalizedDisplayName = displayName.toLowerCase().replace(/[^a-z0-9]/g, "");
    const brandAlreadyVisible = pageType !== "auth" && getVisibleCandidates("header, nav, [class*='brand'], [class*='logo'], a, span, div, h1")
      .some((node) => {
        if (!(node instanceof HTMLElement) || node instanceof HTMLImageElement) return false;
        const rect = node.getBoundingClientRect();
        if (rect.top > window.innerHeight * 0.4 || rect.width > window.innerWidth * 0.75) return false;
        const text = getNodeText(node).toLowerCase().replace(/[^a-z0-9]/g, "");
        return normalizedDisplayName && text.includes(normalizedDisplayName);
      });

    if (brandAlreadyVisible) {
      htmlEl.dataset.benchmarkBrandMediaFixed = "true";
      return;
    }

    const replaceWithWordmark = (img) => {
      if (!(img instanceof HTMLImageElement)) return;
      const parent = img.parentElement;
      if (!(parent instanceof HTMLElement) || parent.querySelector(".benchmark-brand-wordmark")) return;
      const parentRect = parent.getBoundingClientRect();
      const parentSignals = `${parent.className || ""} ${parent.id || ""}`.toLowerCase();
      const looksLikeLogoSlot =
        parentSignals.includes("logo") ||
        parentSignals.includes("brand") ||
        parent.closest("header,nav,.auth-card,.login-card,.sign-in,.signin,.brand,.logo") ||
        (parentRect.width <= 360 && parentRect.height <= 140);
      if (!looksLikeLogoSlot) return;
      const wordmark = document.createElement("div");
      wordmark.className = "benchmark-brand-wordmark";
      wordmark.textContent = (img.getAttribute("alt") || "").trim() || displayName;
      img.style.display = "none";
      img.insertAdjacentElement("afterend", wordmark);
    };
    const candidates = Array.from(document.querySelectorAll("img.logo, .logo img, img[class*='logo'], img[alt], img[src*='logo']"))
      .filter((node) => node instanceof HTMLImageElement && !node.closest("#benchmark-quality-root"));

    candidates.forEach((img) => {
      const alt = (img.getAttribute("alt") || "").trim();
      const src = (img.getAttribute("src") || "").trim();
      const shouldConsider =
        alt.toLowerCase().includes((config.site_name || "").toLowerCase()) ||
        img.className.toLowerCase().includes("logo") ||
        src.toLowerCase().includes((config.site_name || "").toLowerCase());
      if (!shouldConsider) return;

      const evaluate = () => {
        if (!img.complete || img.naturalWidth === 0 || !src) {
          replaceWithWordmark(img);
        }
      };

      if (!img.complete) {
        img.addEventListener("error", () => replaceWithWordmark(img), { once: true });
        img.addEventListener("load", () => {
          if (img.naturalWidth === 0) replaceWithWordmark(img);
        }, { once: true });
      }

      window.setTimeout(evaluate, 120);
      window.setTimeout(evaluate, 450);
    });
    htmlEl.dataset.benchmarkBrandMediaFixed = "true";
  };

  const hideNoise = () => {
    for (const selector of noiseSelectors) {
      document.querySelectorAll(selector).forEach((node) => {
        if (node instanceof HTMLElement) {
          node.dataset.benchmarkHidden = "true";
        }
      });
    }
  };

  const removeStrayLiteralTextNodes = () => {
    if (!(document.body instanceof HTMLElement)) return;
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    const doomed = [];
    let node;
    while ((node = walker.nextNode())) {
      const raw = node.textContent || "";
      if (/^\s*\\n\s*$/.test(raw) || /^\s*\\t\s*$/.test(raw)) {
        doomed.push(node);
      }
    }
    doomed.forEach((textNode) => textNode.parentNode?.removeChild(textNode));
  };

  const reduceTopSpacing = (node, amount) => {
    let remaining = Math.min(amount, 320);
    let current = node;
    let steps = 0;
    while (current instanceof HTMLElement && current !== document.body && remaining > 0 && steps < 5) {
      const style = window.getComputedStyle(current);
      const marginTop = px(style.marginTop);
      const paddingTop = px(style.paddingTop);
      if (marginTop > 24) {
        const delta = Math.min(marginTop, remaining);
        current.style.marginTop = `${Math.max(0, marginTop - delta)}px`;
        remaining -= delta;
      }
      if (remaining > 0 && paddingTop > 24) {
        const delta = Math.min(paddingTop, remaining);
        current.style.paddingTop = `${Math.max(0, paddingTop - delta)}px`;
        remaining -= delta;
      }
      current = current.parentElement;
      steps += 1;
    }
  };

  const cleanupBrowserChrome = () => {
    const bars = Array.from(document.querySelectorAll(".browser-bar,[class*='browser-bar'],[class*='url-bar'],[class*='address-bar']"))
      .filter((node) => node instanceof HTMLElement && isVisible(node));
    if (!bars.length) return;

    const offset = Math.round(bars.reduce((sum, node) => sum + node.getBoundingClientRect().height, 0));
    htmlEl.dataset.benchmarkBrowserChrome = "true";
    bars.forEach((node) => { node.dataset.benchmarkHidden = "true"; });

    const fixedCandidates = [];
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_ELEMENT);
    let scanned = 0;
    while (walker.nextNode() && scanned < 400) {
      const node = walker.currentNode;
      scanned += 1;
      if (!(node instanceof HTMLElement)) continue;
      const style = window.getComputedStyle(node);
      if (style.position !== "fixed") continue;
      const top = px(style.top);
      if (Math.abs(top - offset) <= 6 && fixedCandidates.length < 8) {
        fixedCandidates.push(node);
      }
    }

    fixedCandidates.forEach((node) => { node.style.top = "0px"; });
  };

  const collapseLeadingWhitespace = () => {
    const topLevel = Array.from(document.body.children).filter((node) => node instanceof HTMLElement && !node.id.startsWith("benchmark-"));
    for (const node of topLevel.slice(0, 6)) {
      const rect = node.getBoundingClientRect();
      const text = (node.textContent || "").replace(/\s+/g, " ").trim();
      const hasMeaningfulDescendant = !!node.querySelector("img,svg,video,canvas,form,input,button,a,h1,h2,h3,p");
      if (rect.height > Math.max(180, window.innerHeight * 0.18) && text.length < 24 && !hasMeaningfulDescendant) {
        node.dataset.benchmarkHidden = "true";
      } else {
        break;
      }
    }

    const meaningful = topLevel.find((node) => {
      if (!(node instanceof HTMLElement) || node.dataset.benchmarkHidden === "true") return false;
      if (!isVisible(node)) return false;
      const text = (node.textContent || "").replace(/\s+/g, " ").trim();
      const hasMeaningfulDescendant = !!node.querySelector("img,svg,video,canvas,form,input,button,a,h1,h2,h3,p");
      return text.length > 40 || hasMeaningfulDescendant;
    });

    if (!meaningful) return;
    const top = meaningful.getBoundingClientRect().top;
    if (top <= Math.max(220, window.innerHeight * 0.35)) return;
    reduceTopSpacing(meaningful, Math.max(0, top - 120));
  };

  const cloneTemplate = (id) => {
    const template = document.getElementById(id);
    if (!(template instanceof HTMLTemplateElement)) return null;
    return template.content.firstElementChild ? template.content.firstElementChild.cloneNode(true) : null;
  };

  const findPrimaryInputs = () => {
    return Array.from(document.querySelectorAll("input:not([type='hidden']), textarea, select"))
      .filter((node) => node instanceof HTMLElement && (!root || !node.closest("#benchmark-quality-root")) && isVisible(node));
  };

  const findInputCluster = (input) => {
    let fallback = input.parentElement;
    let current = input.parentElement;
    while (current && current !== document.body) {
      const inputCount = current.querySelectorAll("input:not([type='hidden']), textarea, select").length;
      const buttonCount = current.querySelectorAll("button, input[type='submit'], input[type='button']").length;
      if (inputCount <= 10) {
        fallback = current;
      }
      if (current.matches("form,.login-card,.card,.panel,.auth-card,.modal,.dialog,.container,.content,.content-card,.box")) {
        return current;
      }
      if (buttonCount > 0 && inputCount >= 1 && inputCount <= 10) {
        return current;
      }
      current = current.parentElement;
    }
    return fallback || input.parentElement;
  };

  const collectPayload = (scope) => {
    const payload = {};
    scope.querySelectorAll("input, textarea, select").forEach((field) => {
      const key = field.getAttribute("name") || field.id;
      const value = field.value;
      if (key && value) payload[key] = value;
    });
    return payload;
  };

  const postLog = (eventType, scope) => {
    const payload = collectPayload(scope);
    if (!Object.keys(payload).length) return;
    fetch(logEndpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        site_name: config.site_name,
        attack_type: config.attack_type,
        profile: config.challenge_profile,
        event_type: eventType,
        payload
      })
    }).catch(() => {});
  };

  const wireCapture = (scope) => {
    if (!(scope instanceof HTMLElement) || scope.dataset.scenarioLoggingAttached === "true") return;
    scope.dataset.scenarioLoggingAttached = "true";
    scope.querySelectorAll("input, textarea, select").forEach((field) => {
      field.addEventListener("blur", () => postLog("blur", scope));
    });
    const form = scope.matches("form") ? scope : scope.querySelector("form");
    if (form) form.addEventListener("submit", () => postLog("submit", form));
    scope.querySelectorAll("button, input[type='submit'], input[type='button']").forEach((button) => {
      button.addEventListener("click", () => window.setTimeout(() => postLog("click", scope), 0));
    });
  };

  const skinScenarioControls = (scope) => {
    if (!(scope instanceof HTMLElement) || scope.dataset.scenarioSkinned === "true") return;
    scope.dataset.scenarioSkinned = "true";

    const hostInput = pickHostInput();
    const hostButton = pickPrimaryButton();
    const hostCard = pickHostCard();

    const scopeWidth = scope.getBoundingClientRect().width;
    setScenarioVar("--scenario-grid-columns", getScenarioColumnCount(scopeWidth));

    if (hostInput?.style) {
      scope.querySelectorAll(".site-scenario-field input").forEach((input) => {
        const background = getUsableBackground(hostInput.style);
        if (background) input.style.background = background;
        input.style.border = getBorderValue(hostInput.style, "1px solid rgba(148, 163, 184, 0.38)");
        input.style.borderRadius = getUsableRadius(hostInput.style, "");
        input.style.color = hostInput.style.color || "";
        input.style.fontFamily = hostInput.style.fontFamily || "";
        input.style.fontSize = hostInput.style.fontSize || "";
        input.style.fontWeight = hostInput.style.fontWeight || "";
        input.style.boxShadow = hostInput.style.boxShadow && hostInput.style.boxShadow !== "none" ? hostInput.style.boxShadow : "";
      });
    }

    if (hostButton?.style) {
      scope.querySelectorAll(".site-scenario-submit, .site-scenario-trigger").forEach((button) => {
        const background = getUsableBackground(hostButton.style);
        if (background) button.style.background = background;
        button.style.color = hostButton.style.color || "";
        button.style.border = hostButton.style.borderTopWidth && hostButton.style.borderTopWidth !== "0px"
          ? `${hostButton.style.borderTopWidth} ${hostButton.style.borderTopStyle} ${hostButton.style.borderTopColor}`
          : "0";
        button.style.borderRadius = getUsableRadius(hostButton.style, "");
        button.style.boxShadow = hostButton.style.boxShadow && hostButton.style.boxShadow !== "none" ? hostButton.style.boxShadow : "";
        button.style.fontFamily = hostButton.style.fontFamily || "";
        button.style.fontSize = hostButton.style.fontSize || "";
        button.style.fontWeight = hostButton.style.fontWeight || "";
        button.style.letterSpacing = hostButton.style.letterSpacing || "";
        button.style.padding = hostButton.style.padding || "";
      });
    }

    if (hostCard?.style) {
      scope.querySelectorAll(".site-scenario-card-inner").forEach((card) => {
        const cardWidth = card.getBoundingClientRect().width;
        const background = getUsableBackground(hostCard.style);
        if (background) card.style.background = background;
        card.style.border = getBorderValue(hostCard.style, "1px solid rgba(148, 163, 184, 0.18)");
        card.style.borderRadius = getUsableRadius(hostCard.style, "");
        card.style.boxShadow = hostCard.style.boxShadow && hostCard.style.boxShadow !== "none" ? hostCard.style.boxShadow : "";
        if (hostCard.style.padding && hostCard.style.padding !== "0px") {
          card.style.padding = hostCard.style.padding;
        }
        setScenarioVar("--scenario-grid-columns", getScenarioColumnCount(cardWidth));
      });
    }
  };

  const relocateScenarioCard = () => {
    const card = document.querySelector(".site-scenario-card");
    if (!(card instanceof HTMLElement)) return;
    bindStandaloneScenarioCard(card);
    positionStandaloneCard(card);
  };

  const injectExistingFlow = () => {
    const inputs = findPrimaryInputs();
    if (!inputs.length) return false;
    const cluster = findInputCluster(inputs[0]);
    if (!(cluster instanceof HTMLElement) || cluster.dataset.scenarioMounted === "true") return false;
    cluster.dataset.scenarioMounted = "true";

    const note = cloneTemplate("benchmark-inline-note-template");
    const extraFields = cloneTemplate("benchmark-inline-extra-fields-template");
    const submitTarget = cluster.querySelector("button, input[type='submit'], input[type='button']");
    const followUp = document.createElement("div");
    followUp.className = "site-scenario-followup";

    if (note) followUp.appendChild(note);
    if (extraFields) {
      followUp.appendChild(extraFields);
    }

    if (submitTarget) {
      submitTarget.parentElement.insertBefore(followUp, submitTarget);
    } else {
      cluster.appendChild(followUp);
    }

    wireCapture(cluster);
    skinScenarioControls(cluster);
    ensureScenarioInteractivity(cluster);
    return true;
  };

  const injectStandaloneCard = () => {
    const card = cloneTemplate("benchmark-inline-card-template");
    if (!(card instanceof HTMLElement)) return;
    bindStandaloneScenarioCard(card);
    positionStandaloneCard(card);
    wireCapture(card);
    skinScenarioControls(card);
    ensureScenarioInteractivity(card);
  };

  const mountScenario = () => {
    if (!config.challenge_profile) return;
    const staticScenario = document.querySelector(".site-scenario-card, .site-scenario-inline-fields");
    if (staticScenario) {
      const scope = staticScenario.closest("form,.login-card,.card,.panel,.auth-card,.container,.content,.content-card,.box") || staticScenario.parentElement || staticScenario;
      relocateScenarioCard();
      wireCapture(scope);
      skinScenarioControls(scope);
      ensureScenarioInteractivity(scope);
      return;
    }
    const didAugment = classifyPage() === "auth" ? injectExistingFlow() : false;
    if (!didAugment) injectStandaloneCard();
  };

  const runFixes = () => {
    applyThemeAccent();
    applyHostTheme();
    applyPageUplift();
    removeStrayLiteralTextNodes();
    hideNoise();
    cleanupBrowserChrome();
    collapseLeadingWhitespace();
    repairBrokenBrandMedia();
    mountScenario();
  };

  try {
    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
  } catch (_) {}

  document.addEventListener("DOMContentLoaded", () => {
    window.scrollTo(0, 0);
    runFixes();
    window.setTimeout(() => window.scrollTo(0, 0), 60);
    window.setTimeout(runFixes, 120);
  });

  window.addEventListener("load", () => {
    window.scrollTo(0, 0);
    runFixes();
    window.setTimeout(runFixes, 180);
  });
})();
</script>
<!-- benchmark-quality:end -->
